<html>
<head>
    <title>Zoomie AFM Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="chat.js"></script>
</head>
<body>
<div class="centerContent">
    <div class="welcomeHeader">
        <img src="Assets/zoomieLogo.png">
    </div>
</div>
<div class="errorBanner" id="errorBanner">
    <img src="Assets/warning.png" style="width: 25px; height: 25px;">
    <div class="text">
        <a onclick="closeError()" class="closeErrorButton">Close</a>
        <span class="message" id="errorMessage">This is sample error text!</span>
    </div>
</div>
<br>
<div class="chatSection" id="chatSectionDiv">
    <div class="responseArea" contenteditable="false" id="userResponseH1">User: ...</div>
    <br>
    <div class="responseArea" contenteditable="false" id="aiResponseH1">AI: ...</div>
    <!-- <h1 class="userResponse" id="userResponseH1">User: ...</h1>
    <h1 class="aiResponse" id="aiResponseH1" style="">AI: ...</h1> -->
</div>
<br>
<br>
<div class="centerContent">
    <div class="userInteractionArea" id="userInteractionArea">
    <input type="text" name="questionEntry" placeholder="question..." id="questionEntryField" class="entryField">
        <button id="sendBtn" class="buttonSend">Send</button>
    </div>
</div>

<script>aiResponseTextField = document.getElementById("aiResponseH1")</script>
<script>userResponseTextField = document.getElementById("userResponseH1")</script>
<script>errorBanner = document.getElementById("errorBanner")</script>

<script>
const sendButton = document.getElementById("sendBtn")
const inputField = document.getElementById("questionEntryField")

sendButton.addEventListener("click", async () => {
    console.log(inputField.value)
    sendButton.disabled = true
    inputField.disabled = true

    try {
        await getResponseFromAfm(inputField.value)
    } finally {
        inputField.value = ""
        sendButton.disabled = false
        inputField.disabled = false
    }
})
</script>
</body>
</html>
