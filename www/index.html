<script>aiResponseTextField = document.getElementById("aiResponseH1")</script>
<script>userResponseTextField = document.getElementById("userResponseH1")</script>

<script>
const sendButton = document.getElementById("sendBtn")
const inputField = document.getElementById("questionEntryField")

sendButton.addEventListener("click", async () => {
    console.log(inputField.value)
    sendButton.disabled = true
    inputField.disabled = true

    try {
        await getResponseFromAfm(inputField.value)
    } finally {
        inputField.value = ""
        sendButton.disabled = false
        inputField.disabled = false
    }
})
</script>
